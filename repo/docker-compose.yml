services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-database-password}
      POSTGRES_DB: ${POSTGRES_DB:-gateway}
    volumes:
      - gateway_postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gateway} -d ${POSTGRES_DB:-gateway}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gateway}:${POSTGRES_PASSWORD:-change-this-database-password}@postgres:5432/${POSTGRES_DB:-gateway}
      API_PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-replace-this-secret}
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      STORAGE_ROOT: /app/storage
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-100}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@physicalrisk.com}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-CHANGE_ME_DEMO_PASSWORD}
    volumes:
      - ${VPS_REPOSITORY_PATH:-./storage}:/app/storage
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

  gateway-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  gateway_postgres:
