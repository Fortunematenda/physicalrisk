# MOSS — local + production hostnames
server {
    listen 80;
listen 443 ssl;
http2 on;

ssl_certificate /etc/letsencrypt/live/apps.physicalrisk.com/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/apps.physicalrisk.com/privkey.pem;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;
    server_name moss.localhost moss.physicalrisk.com;
    client_max_body_size 25m;

    # NextAuth must hit the Next.js app, not the Nest API.
    # Large buffers: Keycloak tokens in the session cookie exceed nginx defaults.
    location /api/auth/ {
        set $upstream_moss_web moss-web:3000;
        proxy_pass http://$upstream_moss_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # BFF: session cookie → Keycloak Bearer → Nest API
    location /api/gw/ {
        set $upstream_moss_web moss-web:3000;
        proxy_pass http://$upstream_moss_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        client_max_body_size 25m;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location /api/ {
        set $upstream_moss_api moss-api:4000;
        proxy_pass http://$upstream_moss_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location / {
        set $upstream_moss_web moss-web:3000;
        proxy_pass http://$upstream_moss_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
