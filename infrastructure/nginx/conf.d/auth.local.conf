# Keycloak — local + production hostnames
server {
    listen 80;
listen 443 ssl;
http2 on;

ssl_certificate /etc/letsencrypt/live/apps.physicalrisk.com/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/apps.physicalrisk.com/privkey.pem;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;
    server_name auth.localhost auth.physicalrisk.com;

    location / {
        set $upstream_keycloak keycloak:8080;
        proxy_pass http://$upstream_keycloak;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
