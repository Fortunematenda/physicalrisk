# Catch-all — do NOT route bare localhost to the portal.
# Bare http://localhost is often WordPress or another local stack; proxying it
# here breaks SSO (redirect_uri=http://localhost/... → invalid_redirect_uri /
# missing state cookies when the real app is apps.localhost).
server {
    listen 80 default_server;
    server_name _;

    default_type text/plain;
    return 404 "Unknown host. Use apps.physicalrisk.com, moss.physicalrisk.com, repo.physicalrisk.com, or auth.physicalrisk.com.\n";
}
