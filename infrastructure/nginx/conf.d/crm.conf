server {
    listen 80;
    listen [::]:80;
    server_name crm.physicalrisk.com;

    return 301 https://crm.physicalrisk.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name crm.physicalrisk.com;

    ssl_certificate /etc/letsencrypt/live/crm.physicalrisk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.physicalrisk.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://moss-espocrm:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}
