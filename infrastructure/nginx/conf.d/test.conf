server {
    listen 80;
    server_name test.physicalrisk.com;

    return 301 https://test.physicalrisk.com$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name test.physicalrisk.com;

    ssl_certificate /etc/letsencrypt/live/test.physicalrisk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.physicalrisk.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 256m;

    location / {
        set $upstream_wordpress wordpress:80;
        proxy_pass http://$upstream_wordpress;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}
